services:
  mysql:
    container_name: "mysql-magalums"
    image: "mysql:latest"
    environment:
      - "MYSQL_DATABASE=magaludb"
      - "MYSQL_PASSWORD=admin"
      - "MYSQL_ROOT_PASSWORD=root"
      - "MYSQL_USER=admin"
    ports:
      - "3306:3306"
    volumes:
      - "mysql-magalums:/var/lib/mysql"

volumes:
  mysql-magalums:
